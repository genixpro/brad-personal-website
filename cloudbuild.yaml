substitutions:
  _BUCKET: bradley-arsenault-me-personal-website-static-public
  _FIREBASE_PROJECT_ID: pharaoh-418820
  _FIREBASE_SITE: brad-personal-website-418820

steps:
  - name: node:20
    entrypoint: npm
    args:
      - ci

  - name: node:20
    entrypoint: npm
    args:
      - run
      - build

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - storage
      - rsync
      - dist
      - gs://${_BUCKET}
      - --recursive
      - --delete-unmatched-destination-objects
      - --exclude=(^|/)\.DS_Store$

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        token="$(gcloud auth print-access-token)"
        html_cache_control="no-cache, max-age=0, must-revalidate"

        find dist -name '*.html' -print | while IFS= read -r file; do
          object="${file#dist/}"

          gcloud storage objects update "gs://${_BUCKET}/${object}" \
            --cache-control="${html_cache_control}" \
            >/dev/null
        done

        find dist -name index.html -mindepth 2 -print | while IFS= read -r file; do
          route="${file#dist/}"
          route="${route%/index.html}"

          curl --fail --silent --show-error \
            --request POST \
            --data-binary "@${file}" \
            --header "Authorization: Bearer ${token}" \
            --header "Content-Type: text/html" \
            --header "Cache-Control: ${html_cache_control}" \
            "https://storage.googleapis.com/upload/storage/v1/b/${_BUCKET}/o?uploadType=media&name=${route}" \
            >/dev/null
        done

  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm install -g firebase-tools
        cat > /workspace/firebase.json <<EOF
        {
          "hosting": {
            "site": "${_FIREBASE_SITE}",
            "public": "dist",
            "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
            "headers": [
              {
                "source": "/_astro/**",
                "headers": [
                  {"key": "Cache-Control", "value": "public, max-age=31536000, immutable"}
                ]
              },
              {
                "source": "**/*.html",
                "headers": [
                  {"key": "Cache-Control", "value": "no-cache, max-age=0, must-revalidate"}
                ]
              }
            ]
          }
        }
        EOF
        firebase deploy \
          --project "${_FIREBASE_PROJECT_ID}" \
          --config /workspace/firebase.json \
          --only hosting \
          --non-interactive

options:
  logging: CLOUD_LOGGING_ONLY

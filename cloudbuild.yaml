substitutions:
  _BUCKET: brad-personal-website-pharaoh-418820

steps:
  - name: node:20
    entrypoint: npm
    args:
      - ci

  - name: node:20
    entrypoint: npm
    args:
      - run
      - build

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - storage
      - rsync
      - dist
      - gs://${_BUCKET}
      - --recursive
      - --delete-unmatched-destination-objects
      - --exclude=(^|/)\.DS_Store$

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        token="$(gcloud auth print-access-token)"

        find dist -name index.html -mindepth 2 -print | while IFS= read -r file; do
          route="${file#dist/}"
          route="${route%/index.html}"

          curl --fail --silent --show-error \
            --request POST \
            --data-binary "@${file}" \
            --header "Authorization: Bearer ${token}" \
            --header "Content-Type: text/html" \
            --header "Cache-Control: public, max-age=3600" \
            "https://storage.googleapis.com/upload/storage/v1/b/${_BUCKET}/o?uploadType=media&name=${route}" \
            >/dev/null
        done

options:
  logging: CLOUD_LOGGING_ONLY
